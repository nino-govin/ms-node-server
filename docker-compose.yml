version: '3'

services:
  node-app:
    image: node:24-alpine
    working_dir: /app
    ports:
      - "8081:8081"
    volumes:
      - .:/app
    command: sh -c "npm install && npm start"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - node-app

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus